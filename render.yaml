services:
  # Backend API Service
  - type: web
    name: tanzania-real-estate-ai-api
    env: python
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    healthCheckTimeout: 100
    autoDeploy: false
    plan: free
    
  # Environment variables
  envVars:
    - key: PORT
      value: 8000
    - key: PYTHON_VERSION
      value: 3.9
    - key: NODE_VERSION
      value: 18

# Service configuration
  - type: web
    name: tanzania-real-estate-ai
    env: python
    plan: free
