[build]
  base = "frontend"
  publish = "dist"
  command = "npm install && npm run build"

[[redirects]]
  from = "/api/*"
  to = "https://tanzania-real-estate-ai.onrender.com/api/:splat"
  status = 200

[[redirects]]
  from = "/health"
  to = "https://tanzania-real-estate-ai.onrender.com/health"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"
