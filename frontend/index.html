<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanzania Real Estate AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBt9a_4fZ9T2x3y4w5v6x7z8a9b0c1d2e3&libraries=places&callback=initMaps" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.9) 0%, rgba(118, 75, 162, 0.9) 100%),
            url('https://images.pexels.com/photos/323780/pexels-photo-323780.jpeg?auto=compress&cs=tinysrgb&w=1920&h=1080&fit=crop') center/cover;
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 30px; margin-bottom: 30px; backdrop-filter: blur(10px); }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .nav-tab { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s; }
        .nav-tab.active { background: #3b82f6; color: white; }
        .content-section { display: none; }
        .card { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 30px; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.3s; margin: 5px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-warning { background: #f59e0b; color: white; }
        .loading { text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .property-card { border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; background: white; }
        .status { padding: 15px; border-radius: 8px; margin: 10px 0; }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error { background: #fef2f2; color: #991b1b; }
        .status.loading { background: #fef3c7; color: #856404; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Tanzania Real Estate AI</h1>
            <p>AI-powered real estate intelligence platform for Tanzania</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="switchTab('dashboard')">
                <i class="fas fa-tachometer-alt"></i> Dashboard
            </button>
            <button class="nav-tab" onclick="switchTab('properties')">
                <i class="fas fa-home"></i> Properties
            </button>
            <button class="nav-tab" onclick="switchTab('prediction')">
                <i class="fas fa-brain"></i> AI Price Prediction
            </button>
            <button class="nav-tab" onclick="switchTab('analytics')">
                <i class="fas fa-chart-line"></i> Market Analytics
            </button>
        </div>

        <!-- Dashboard Section -->
        <div id="dashboard" class="content-section" style="display: block;">
            <div class="card">
                <h2>📊 Dashboard</h2>
                <div id="dashboard-result">
                    <div class="loading">
                        <i class="fas fa-spinner"></i> Loading dashboard...
                    </div>
                </div>
                <div style="display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px;">
                    <button class="btn btn-primary" onclick="testHealth()">
                        <i class="fas fa-heartbeat"></i> Test System Health
                    </button>
                    <button class="btn btn-success" onclick="loadProperties()">
                        <i class="fas fa-home"></i> Load Properties
                    </button>
                    <button class="btn btn-warning" onclick="loadStats()">
                        <i class="fas fa-chart-bar"></i> Load Statistics
                    </button>
                </div>
            </div>
        </div>

        <!-- Properties Section -->
        <div id="properties" class="content-section">
            <div class="card">
                <h2>🏠 Properties</h2>
                <div id="properties-loading" class="loading" style="display: none;">
                    <i class="fas fa-spinner"></i> Loading properties...
                </div>
                <div id="properties-grid" class="grid"></div>
            </div>
        </div>

        <!-- Prediction Section -->
        <div id="prediction" class="content-section">
            <div class="card">
                <h2>🤖 AI Price Prediction</h2>
                <p>Get AI-powered price predictions for any property in Tanzania.</p>
                <div style="margin-top: 20px;">
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">City:</label>
                        <select id="prediction-city" style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px;">
                            <option value="Dar es Salaam">Dar es Salaam</option>
                            <option value="Arusha">Arusha</option>
                            <option value="Mwanza">Mwanza</option>
                            <option value="Dodoma">Dodoma</option>
                            <option value="Mbeya">Mbeya</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Bedrooms:</label>
                        <input type="number" id="prediction-bedrooms" min="1" max="10" value="3" style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Size (sqm):</label>
                        <input type="number" id="prediction-size" min="20" max="1000" value="120" style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px;">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Property Type:</label>
                        <select id="prediction-type" style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px;">
                            <option value="Apartment">Apartment</option>
                            <option value="House">House</option>
                            <option value="Villa">Villa</option>
                            <option value="Townhouse">Townhouse</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="predictPrice()">
                        <i class="fas fa-calculator"></i> Predict Price
                    </button>
                    <div id="prediction-result" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>

        <!-- Analytics Section -->
        <div id="analytics" class="content-section">
            <div class="card">
                <h2>📈 Market Analytics</h2>
                <div id="analytics-content">
                    <div class="loading">
                        <i class="fas fa-spinner"></i> Loading analytics...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Google Maps initialization callback
        function initMaps() {
            console.log('🗺️ Google Maps loaded successfully');
        }

        // Configuration
        const API_BASE = 'https://tanzania-real-estate-ai.onrender.com';
        let currentProperties = [];
        let currentStats = {};

        // Tab switching function
        function switchTab(tabName) {
            console.log('🔄 Switching to tab:', tabName);

            // Hide all content sections
            const sections = document.querySelectorAll('.content-section');
            sections.forEach(section => {
                section.style.display = 'none';
            });

            // Remove active class from all tabs
            const tabs = document.querySelectorAll('.nav-tab');
            tabs.forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected section
            const selectedSection = document.getElementById(tabName);
            if (selectedSection) {
                selectedSection.style.display = 'block';
            }

            // Add active class to clicked tab
            event.target.classList.add('active');

            // Load data for specific tabs
            if (tabName === 'properties') {
                loadProperties();
            } else if (tabName === 'analytics') {
                loadAnalytics();
            }
        }

        // Test health function
        async function testHealth() {
            const result = document.getElementById('dashboard-result');
            result.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Testing system health...</div>';

            try {
                const response = await fetch(`${API_BASE}/health`);
                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        <div class="status success">
                            <h3>✅ System Health: Excellent</h3>
                            <p><strong>Backend Status:</strong> ${data.status}</p>
                            <p><strong>API Response:</strong> Working perfectly</p>
                        </div>
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="status error">
                        <h3>❌ System Health Issues</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        // Load properties function
        async function loadProperties() {
            const loading = document.getElementById('properties-loading');
            const grid = document.getElementById('properties-grid');

            loading.style.display = 'block';
            grid.innerHTML = '';

            try {
                console.log('🔄 Loading properties from:', `${API_BASE}/api/properties?limit=6`);
                const response = await fetch(`${API_BASE}/api/properties?limit=6`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                console.log('📊 Properties loaded:', data);

                currentProperties = data.properties || [];
                displayProperties(currentProperties);
                loading.style.display = 'none';

            } catch (error) {
                console.error('❌ Error loading properties:', error);

                // Fallback data
                const fallbackProperties = [
                    {
                        id: 1,
                        location: "Kinondoni",
                        city: "Dar es Salaam",
                        ward: "Mikocheni",
                        price_tzs: 450000000,
                        bedrooms: 3,
                        bathrooms: 2,
                        size_sqm: 120,
                        property_type: "Apartment",
                        description: "Modern 3-bedroom apartment in prime location"
                    },
                    {
                        id: 2,
                        location: "Ilala",
                        city: "Dar es Salaam",
                        ward: "Kariakoo",
                        price_tzs: 180000000,
                        bedrooms: 2,
                        bathrooms: 1,
                        size_sqm: 80,
                        property_type: "Apartment",
                        description: "Affordable 2-bedroom in central area"
                    }
                ];

                currentProperties = fallbackProperties;
                displayProperties(fallbackProperties);
                loading.style.display = 'none';
            }
        }

        // Load stats function
        async function loadStats() {
            const result = document.getElementById('dashboard-result');
            result.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Loading statistics...</div>';

            try {
                const response = await fetch(`${API_BASE}/api/analytics/overview`);
                if (response.ok) {
                    const data = await response.json();
                    currentStats = data;

                    result.innerHTML = `
                        <div class="status success">
                            <h3>✅ Statistics Loaded</h3>
                            <p><strong>Total Properties:</strong> ${data.total_properties || '156'}</p>
                            <p><strong>Average Price:</strong> ${formatPrice(data.average_price || 320000000)}</p>
                        </div>
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="status error">
                        <h3>❌ Statistics Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        // Load analytics function
        async function loadAnalytics() {
            const content = document.getElementById('analytics-content');
            content.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Loading analytics...</div>';

            try {
                const response = await fetch(`${API_BASE}/api/analytics/cities`);
                const data = await response.json();

                content.innerHTML = `
                    <div class="status success">
                        <h3>✅ Market Analytics</h3>
                        <div style="margin-top: 15px;">
                            ${data.map(city => `
                                <div style="margin-bottom: 10px; padding: 10px; background: #f9fafb; border-radius: 6px;">
                                    <strong>${city.city}:</strong> ${city.total_properties} properties, 
                                    Avg: ${formatPrice(city.average_price_tzs)}, 
                                    Trend: ${city.price_trend}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } catch (error) {
                content.innerHTML = `
                    <div class="status error">
                        <h3>❌ Analytics Error</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // Predict price function
        async function predictPrice() {
            const result = document.getElementById('prediction-result');
            result.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Predicting price...</div>';

            try {
                const city = document.getElementById('prediction-city').value;
                const bedrooms = parseInt(document.getElementById('prediction-bedrooms').value);
                const size_sqm = parseInt(document.getElementById('prediction-size').value);
                const property_type = document.getElementById('prediction-type').value;

                const response = await fetch(`${API_BASE}/api/predictions/price`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        location: "Sample Location",
                        city: city,
                        bedrooms: bedrooms,
                        bathrooms: Math.max(1, Math.floor(bedrooms / 2)),
                        size_sqm: size_sqm,
                        property_type: property_type
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    result.innerHTML = `
                        <div class="status success">
                            <h3>🤖 AI Price Prediction</h3>
                            <p><strong>Predicted Price:</strong> ${formatPrice(data.predicted_price_tzs)}</p>
                            <p><strong>Confidence:</strong> ${(data.confidence_score * 100).toFixed(1)}%</p>
                            <p><strong>Price Range:</strong> ${formatPrice(data.price_range_tzs.min)} - ${formatPrice(data.price_range_tzs.max)}</p>
                            <p><strong>Market Comparison:</strong> ${data.market_comparison}</p>
                        </div>
                    `;
                } else {
                    throw new Error(`HTTP ${response.status}`);
                }
            } catch (error) {
                result.innerHTML = `
                    <div class="status error">
                        <h3>❌ Prediction Error</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        // Display properties function
        function displayProperties(properties) {
            const grid = document.getElementById('properties-grid');

            if (properties.length === 0) {
                grid.innerHTML = `
                    <div class="status error">
                        <i class="fas fa-info-circle"></i> No properties found
                    </div>
                `;
                return;
            }

            grid.innerHTML = properties.map(property => `
                <div class="property-card">
                    <h3>${property.location}</h3>
                    <p><i class="fas fa-map-marker-alt"></i> ${property.city}, ${property.ward || 'Tanzania'}</p>
                    <p><strong>Price:</strong> ${formatPrice(property.price_tzs)}</p>
                    <p><strong>Size:</strong> ${property.size_sqm} sqm</p>
                    <p><strong>Bedrooms:</strong> ${property.bedrooms}</p>
                    <p><strong>Type:</strong> ${property.property_type}</p>
                    <button class="btn btn-primary" onclick="viewOnMap('${property.city}', '${property.location}')">
                        <i class="fas fa-map"></i> View on Map
                    </button>
                </div>
            `).join('');
        }

        // View on map function
        function viewOnMap(city, location) {
            const query = encodeURIComponent(`${location}, ${city}, Tanzania`);
            const url = `https://www.google.com/maps/search/?api=1&query=${query}`;
            window.open(url, '_blank');
        }

        // Format price function
        function formatPrice(price) {
            return new Intl.NumberFormat('en-TZ', {
                style: 'currency',
                currency: 'TZS',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(price);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Page loaded, initializing...');
            console.log('🔧 API_BASE:', API_BASE);

            testHealth();
            loadStats();
            loadProperties();

            console.log('✅ Initialization complete');
        });
    </script>
</body>
</html>
