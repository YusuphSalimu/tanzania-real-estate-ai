<!DOCTYPE html>
<html>
<head>
    <title>API Debug Test</title>
</head>
<body>
    <h1>API Debug Test</h1>
    <div id="results"></div>
    
    <script>
        const API_BASE = 'https://tanzania-real-estate-ai.onrender.com';
        
        async function testAPI() {
            const results = document.getElementById('results');
            results.innerHTML = '<h2>Testing API...</h2>';
            
            try {
                // Test health endpoint
                const healthResponse = await fetch(`${API_BASE}/health`);
                const healthData = await healthResponse.json();
                results.innerHTML += `<p>✅ Health: ${healthData.status}</p>`;
                
                // Test properties endpoint
                const propsResponse = await fetch(`${API_BASE}/api/properties?limit=3`);
                const propsData = await propsResponse.json();
                results.innerHTML += `<p>✅ Properties: Found ${propsData.properties.length} properties</p>`;
                
                // Test stats endpoint
                const statsResponse = await fetch(`${API_BASE}/api/stats`);
                const statsData = await statsResponse.json();
                results.innerHTML += `<p>✅ Stats: ${statsData.total_properties} total properties</p>`;
                
                results.innerHTML += '<h3>✅ All API endpoints working!</h3>';
                
            } catch (error) {
                results.innerHTML += `<h3>❌ Error: ${error.message}</h3>`;
            }
        }
        
        // Test immediately
        testAPI();
    </script>
</body>
</html>
